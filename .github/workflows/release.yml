name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run release checks
        run: pnpm format && pnpm test && pnpm build && pnpm lint

      - name: Pack npm artifact
        run: npm pack

      - name: Publish package to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Skipping npm publish."
            exit 0
          fi

          npm publish --access public

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" ./*.tgz --clobber
            exit 0
          fi

          TAG_COMMIT=$(git rev-parse "$TAG_NAME^{commit}")
          VERSION=${TAG_NAME#v}
          PREVIOUS_TAG=""

          if git rev-parse --verify "${TAG_COMMIT}^" >/dev/null 2>&1; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 --first-parent "${TAG_COMMIT}^" 2>/dev/null || true)
          fi

          API_ARGS=(
            --method POST
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f "tag_name=${TAG_NAME}"
          )

          if [[ -n "$PREVIOUS_TAG" ]]; then
            API_ARGS+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          NATIVE_NOTES=$(gh api "${API_ARGS[@]}" --jq '.body // ""')

          if grep -Eq '/pull/[0-9]+' <<<"$NATIVE_NOTES"; then
            printf '%s\n' "$NATIVE_NOTES" > release-notes.md
          else
            {
              echo "## What's Changed"

              if [[ -n "$PREVIOUS_TAG" ]]; then
                RANGE="${PREVIOUS_TAG}..${TAG_NAME}"
              else
                RANGE="$TAG_NAME"
              fi

              git log "$RANGE" --no-merges --format='%H%x09%h%x09%s' |
                while IFS=$'\t' read -r sha short subject; do
                  if [[ "$sha" == "$TAG_COMMIT" && "$subject" == "$VERSION" ]]; then
                    continue
                  fi

                  printf '* %s ([%s](https://github.com/%s/commit/%s))\n' \
                    "$subject" "$short" "$GITHUB_REPOSITORY" "$sha"
                done

              if [[ -n "$PREVIOUS_TAG" ]]; then
                echo
                echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
              fi
            } > release-notes.md
          fi

          RELEASE_ARGS=(
            "$TAG_NAME"
            ./*.tgz
            --notes-file release-notes.md
            --title "$TAG_NAME"
          )

          if [[ "$TAG_NAME" == *-* ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "${RELEASE_ARGS[@]}"
